<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadence Report Uploader</title>
  </head>
  <body>
    <h1>Upload Excel (with Power Query)</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
        {% for msg in messages %}
          <li>{{ msg }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
    <form method="post" action="/upload" enctype="multipart/form-data">
      <input type="file" name="file" accept=".xls,.xlsx,.xlsm,.xlsb" required>
      <button type="submit">Upload & Process</button>
    </form>
  </body>
</html>
